spring:
  application:
    name: j-court-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 10
        order_updates: true
        order_inserts: true
        format_sql: true
        generate_statistics: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    baseline-version: 0
    schemas: postgres

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

server:
  port: 8088

services:
  notification:
    url:
      mail: ${NOTIFICATION_MAIL_URL}
      merchantLogin: ${NOTIFICATION_MERCHANT_LOGIN}
      merchantPassword: ${NOTIFICATION_MERCHANT_PASSWORD}
  gcp:
    url:
      getUser: ${GET_USER_URL:http://localhost:8080/gcp_api/api/gcp/users/by-pi}

gemini:
  url: ${GEMINI_URL}
  key: ${GEMINI_KEY}